title: 个人服务导航
subtitle: 只读入口页，服务状态由后台定时缓存
check_interval: 30s

auth:
  enabled: false
  username: admin
  password: change-me
  session_secret: change-this-to-at-least-32-random-characters
  session_ttl: 24h

assets:
  uploads_dir: ""
  uploads_url_prefix: /uploads/
  icon_cache_dir: ""

appearance:
  background_color: "#000000"
  background_image: ""
  background_overlay: "medium"

groups:
  - id: ops
    name: 运维工具
    services:
      - id: dockge
        name: Dockge
        description: Docker Compose 管理入口，只提供跳转链接
        icon_text: D
        internal_url: http://dockge.example.local
        external_url: https://dockge.example.com
        tags:
          - docker
          - ops
        health:
          type: http
          url: http://dockge.example.local
          expect_status: 200
          timeout: 2s

      - id: ssh-gateway
        name: SSH 网关
        description: 内网维护入口示例
        icon_text: SSH
        internal_url: http://gateway.example.local
        external_url: ""
        tags:
          - ops
          - tcp
        notes: TCP 检查只判断端口是否可连接，不执行登录。
        health:
          type: tcp
          address: gateway.example.local:22
          timeout: 2s

  - id: tools
    name: 开发工具
    services:
      - id: drawio
        name: Draw.io
        description: 图表绘制工具
        icon_text: DI
        internal_url: http://drawio.example.local
        external_url: https://drawio.example.com
        tags:
          - diagram
          - tools
        notes: 外部服务或不需要探测的入口可以禁用健康检查。
        health:
          type: disabled
